version: "3.9"

services:
  ai-news-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-news-agent:latest
    container_name: ai-news-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite persistence
      - ./logs:/app/logs          # Log persistence
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

